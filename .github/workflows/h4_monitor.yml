name: XTB H4 Monitor

on:
  schedule:
    # BACKUP: chạy +25 phút sau H4 close, phòng cron-job.org miss
    # Primary trigger: cron-job.org → workflow_dispatch (chính xác ~30s)
    - cron: '25 0,4,8,12,16,20 * * *'

  # Trigger chính từ cron-job.org + manual
  workflow_dispatch:

concurrency:
  group: h4-monitor
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: last_sent.txt
          key: h4-state-dummy
          restore-keys: h4-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run H4 Analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SYMBOLS: BTCUSDT,BNBUSDT,LINKUSDT,HNTUSDT
          SIDE: buy
        run: python3 xtb_cloud.py

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: last_sent.txt
          key: h4-state-${{ github.run_id }}

