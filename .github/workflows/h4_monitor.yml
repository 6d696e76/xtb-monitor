name: XTB H4 Monitor

on:
  schedule:
    # Retry 3 lần mỗi H4 close: +5min, +15min, +25min
    # H4 close: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    # State file sẽ chặn duplicate — chỉ lần đầu thành công mới gửi
    - cron: '5,15,25 0,4,8,12,16,20 * * *'

  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:

concurrency:
  group: h4-monitor
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: last_sent.txt
          key: h4-state-dummy
          restore-keys: h4-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run H4 Analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SYMBOLS: BTCUSDT,BNBUSDT,LINKUSDT
          SIDE: buy
        run: python3 xtb_cloud.py

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: last_sent.txt
          key: h4-state-${{ github.run_id }}

